name: Dinamo Karte Scraper
 
on:
  schedule:
    - cron: '0 * * * *'   # svaki sat u :00
  workflow_dispatch:        # ručno pokretanje iz GitHub UI
 
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package.json
 
      - name: Install dependencies
        run: npm ci
        working-directory: scraper
 
      - name: Run scraper
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node index.js
        working-directory: scraper
 
      - name: Log result
        if: always()
        run: echo "Scraper završio u $(date '+%Y-%m-%d %H:%M:%S UTC')"
 
