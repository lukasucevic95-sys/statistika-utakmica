name: Dinamo Karte Scraper

on:
  schedule:
    - cron: '*/30 * * * *'   # svakih 30 minuta
  workflow_dispatch:        # ručno pokretanje iz GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install
        working-directory: scraper

      - name: Run scraper
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node index.js
        working-directory: scraper

      - name: Log result
        if: always()
        run: echo "Scraper završio u $(date '+%Y-%m-%d %H:%M:%S UTC')"
